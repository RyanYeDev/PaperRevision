server:
  port: 8088

spring:
  application:
    name: paper-revision
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/paper_revision
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deletedAt
      logic-delete-value: now()
      logic-not-delete-value: "null"
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# Knife4j API文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT配置
jwt:
  secret: paper-revision-jwt-secret-key-2024-please-change-in-production
  expiration: 86400000  # 24小时

# Milvus向量数据库配置
milvus:
  host: localhost
  port: 19530
  database: default

# LLM提供商默认配置 (DeepSeek + Doubao)
llm:
  providers:
    deepseek:
      name: DeepSeek
      base-url: https://api.deepseek.com
      default-model: deepseek-chat
    doubao:
      name: 豆包(Doubao)
      base-url: https://ark.cn-beijing.volces.com/api/v3
      default-model: doubao-pro-32k

# 文件存储配置
file-storage:
  type: local
  local-path: ./data/files

# GROBID学术论文结构化解析
grobid:
  enabled: true
  home: ./data/grobid-home
  # 模型模式: dl (深度学习,精度高需GPU) | crf (条件随机场,CPU开箱即用) | auto (先尝试DL,不可用回退CRF)
  model-mode: auto
