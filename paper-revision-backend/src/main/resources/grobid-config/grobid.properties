# ═══════════════════════════════════════════════════════════════
# GROBID 0.9.0 配置文件
# ═══════════════════════════════════════════════════════════════
#
# 模型选择策略:
#   CRF (默认)   - 条件随机场，CPU友好，开箱即用
#   DL  (推荐)   - 深度学习，BidLSTM-CRF / SciBERT，精度显著更高
#
# 精度提升最大的DL模型:
#   - 参考文献解析 (引用识别 +20% F1)
#   - 头部元数据 (标题/作者 +15% F1)
#   - 引用列表解析 (+25% F1)

# ═══════════════════════════════════════════════════════════════
# 核心模型: 全部使用 DL (最高精度)
# ═══════════════════════════════════════════════════════════════
# 全文分割模型 -> DL (BidLSTM-CRF + 布局特征)
grobid.model.segmentation.name=dl-segmentation

# 头部模型 (标题/作者/摘要) -> DL
grobid.model.header.name=dl-header

# 参考文献分段模型 -> DL
grobid.model.referenceSegmenter.name=dl-reference-segmenter

# 引用模型 -> DL (精度提升最显著)
grobid.model.citation.name=dl-citation

# 全文字段模型 -> DL
grobid.model.fulltext.name=dl-fulltext

# ═══════════════════════════════════════════════════════════════
# 辅助模型: 保留 CRF (稳定可靠)
# ═══════════════════════════════════════════════════════════════
grobid.model.affiliationAddress.name=affiliation-address
grobid.model.date.name=date
grobid.model.patent.name=patent
grobid.model.patentCitation.name=patent-citation

# ═══════════════════════════════════════════════════════════════
# 引擎配置
# ═══════════════════════════════════════════════════════════════
# 并行线程数 (根据CPU核心数调整)
grobid.nb_threads=4

# PDF转XML引擎: pdfalto (GROBID 0.8+ 默认，原生支持布局特征)
grobid.pdf.stapler.method=pdfalto

# ═══════════════════════════════════════════════════════════════
# DL 模型配置 (delft + JEP)
# ═══════════════════════════════════════════════════════════════
# JEP (Java Embedded Python) 配置
# DL模型通过JEP调用Python/DeLFT运行时
# 确保已安装: pip install delft tensorflow
grobid.delft.enabled=true
grobid.delft.python.virtualEnv=

# ═══════════════════════════════════════════════════════════════
# 精度/速度平衡
# ═══════════════════════════════════════════════════════════════
# 批次大小 (GPU可用时调大)
grobid.delft.batchSize=5

# 超时 (毫秒)
grobid.delft.timeout=60000

# ═══════════════════════════════════════════════════════════════
# DL fallback: DL模型不可用时自动回退到CRF
# ═══════════════════════════════════════════════════════════════
grobid.delft.fallback.crf=true
