name: Build and Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: "17", distribution: "temurin" }
      - name: Build with Maven
        run: cd paper-revision-backend && mvn clean compile -q
      - name: Run tests
        run: cd paper-revision-backend && mvn test -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install dependencies
        run: cd paper-revision-frontend && npm install --legacy-peer-deps
      - name: Build
        run: cd paper-revision-frontend && npm run build
